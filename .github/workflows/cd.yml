# ──────────────────────────────────────────────────────────────────────────────
# Aqila IMS — Continuous Deployment
#
# Triggers only on push to main (after CI passes via branch protection).
#
# Pipeline:
#   1. Build multi-stage Docker image
#   2. Push to GitHub Container Registry (GHCR)
#   3. SSH into production server
#   4. Pull new image + restart container
#   5. Healthcheck — rollback if /api/health fails
#
# Required GitHub Secrets:
#   VPS_HOST          — Production server IP or hostname
#   VPS_USER          — SSH user (e.g. "deploy")
#   VPS_SSH_KEY       — Private SSH key (ed25519 recommended)
#   VPS_PORT          — SSH port (default 22)
#   DATABASE_URL      — Production PostgreSQL connection string
#   AUTH_SECRET       — Production Auth.js secret (openssl rand -base64 32)
#   NEXTAUTH_URL      — Production URL (e.g. https://ims.aqila.no)
# ──────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deployment"
        required: false

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aqila-ims

jobs:
  # ── Build & Push Docker image ───────────────────────────────────────────────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Deploy to VPS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    environment:
      name: production
      url: ${{ vars.NEXTAUTH_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "📦 Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "🔄 Stopping old container (if running)..."
            docker stop aqila_ims_app || true
            docker rm aqila_ims_app || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name aqila_ims_app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e NODE_ENV="production" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "⏳ Waiting for healthcheck..."
            ATTEMPTS=0
            until docker inspect --format='{{.State.Health.Status}}' aqila_ims_app | grep -q healthy; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge 12 ]; then
                echo "❌ Healthcheck failed after 60s. Rolling back..."
                docker stop aqila_ims_app
                docker rm aqila_ims_app
                exit 1
              fi
              echo "   Attempt $ATTEMPTS/12..."
              sleep 5
            done

            echo "✅ Deployment successful!"
            echo "🧹 Removing dangling images..."
            docker image prune -f

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Aqila IMS deployed successfully to production"
          else
            echo "❌ Deployment failed — previous version still running"
          fi
